<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Literary Index — UGC NET English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --crimson-deeper: #350A0A;
    --crimson-dark:   #4A0E0E;
    --gold:           #C9922A;
    --gold-pale:      #F7EDCC;
    --gold-faint:     #FBF5E6;
    --parchment:      #FAF6ED;
    --ink:            #1C120A;
    --ink-muted:      #5C4A38;
    --ink-faint:      #9E8A72;
    --border:         rgba(180,130,50,0.25);
    --border-strong:  rgba(180,130,50,0.55);
    --sans:    'EB Garamond', Georgia, serif;
    --display: 'Cinzel', Georgia, serif;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html { background: var(--parchment); }
  body {
    min-height: 100vh;
    font-family: var(--sans);
    color: var(--ink);
    background: var(--parchment);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  /* ── Header ── */
  .app-header {
    background: var(--crimson-deeper);
    padding: calc(14px + var(--safe-top)) 16px 16px;
    text-align: center;
    border-bottom: 1px solid var(--gold);
    position: sticky; top: 0; z-index: 20;
  }
  .app-header::after {
    content: '';
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--gold) 0, var(--gold) 6px, transparent 6px, transparent 10px);
    position: absolute; bottom: 0; left: 0; right: 0;
    display: block;
  }
  .header-ornament { font-size: 10px; letter-spacing: 0.28em; color: var(--gold); font-family: var(--display); opacity: 0.75; margin-bottom: 4px; }
  .app-title { font-family: var(--display); font-size: 22px; font-weight: 600; color: var(--gold-pale); letter-spacing: 0.07em; line-height: 1; }
  .app-subtitle { font-style: italic; font-size: 12px; color: rgba(230,200,140,0.65); margin-top: 4px; }

  /* ── Search ── */
  .search-wrap {
    background: var(--crimson-darker, #2A0808);
    padding: 10px 14px;
    position: sticky; top: calc(84px + var(--safe-top)); z-index: 19;
    border-bottom: 1px solid var(--border-strong);
    background: #2A0808;
  }
  .search-input {
    width: 100%;
    background: rgba(255,245,220,0.08);
    border: 1px solid rgba(201,146,42,0.4);
    border-radius: 8px;
    padding: 9px 14px 9px 36px;
    font-family: var(--sans);
    font-size: 15px;
    color: var(--gold-pale);
    outline: none;
    -webkit-appearance: none;
  }
  .search-input::placeholder { color: rgba(230,200,140,0.4); font-style: italic; }
  .search-input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute;
    left: 26px; top: 50%; transform: translateY(-50%);
    color: rgba(201,146,42,0.5);
    font-size: 16px; pointer-events: none;
  }
  .search-wrap { position: sticky; top: 0; z-index: 19; }

  /* ── Scroll ── */
  .scroll-area { padding: 16px 12px calc(40px + var(--safe-bottom)); }

  /* ── Century block ── */
  .century-block { margin-bottom: 32px; }
  .century-heading {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 600;
    color: var(--gold-pale);
    background: var(--crimson-dark);
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 14px;
    letter-spacing: 0.06em;
    border-left: 4px solid var(--gold);
  }

  /* ── Period / movement section ── */
  .period-section { margin-bottom: 20px; }
  .period-header {
    display: flex; align-items: center; gap: 9px;
    margin-bottom: 8px; padding-bottom: 7px;
    border-bottom: 1px solid var(--border-strong);
  }
  .period-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.12); }
  .period-name { font-family: var(--display); font-size: 11.5px; font-weight: 500; letter-spacing: 0.1em; color: var(--crimson-dark); text-transform: uppercase; flex: 1; }
  .period-years { font-style: italic; font-size: 11px; color: var(--ink-faint); }

  .ornament-divider { text-align: center; font-size: 11px; color: var(--gold); opacity: 0.4; margin: 2px 0 8px; letter-spacing: 0.3em; }

  /* ── Writer grid ── */
  .writer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }

  .writer-link {
    background: #FFFDF7;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0;
    text-align: left;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s, border-color 0.12s;
    min-height: 78px;
  }
  .writer-link:active { background: var(--gold-faint); border-color: var(--gold); }
  .writer-link.hidden { display: none; }

  .w-stripe { height: 3px; width: 100%; flex-shrink: 0; }
  .w-body { padding: 7px 9px 9px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .w-name { font-family: var(--display); font-size: 12px; font-weight: 500; color: var(--ink); line-height: 1.22; }
  .w-dates { font-size: 10.5px; color: var(--ink-faint); font-style: italic; }
  .w-nat {
    display: inline-block;
    font-size: 9.5px;
    font-family: var(--display);
    letter-spacing: 0.06em;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 2px;
    border: 1px solid;
    width: fit-content;
  }
  .w-work { font-size: 10.5px; color: var(--ink-muted); font-style: italic; margin-top: 2px; line-height: 1.3; }
  .w-arrow { position: absolute; bottom: 6px; right: 7px; font-size: 12px; color: var(--gold); opacity: 0.55; }

  /* ── No results ── */
  #no-results { display: none; text-align: center; padding: 40px 20px; font-style: italic; color: var(--ink-faint); font-size: 15px; }
</style>
</head>

// Nationality colour coding
const NAT_COLORS = {
  "British":       { bg:"#E8F0F8", color:"#1A3A6B", border:"#A8C0DC" },
  "Irish":         { bg:"#E8F5EC", color:"#1A5C2A", border:"#A8D4B0" },
  "American":      { bg:"#F5EBE8", color:"#7B1D1D", border:"#D4A8A0" },
  "Indian":        { bg:"#FFF3E0", color:"#7A3C00", border:"#DFBB80" },
  "Scottish":      { bg:"#EDF3F8", color:"#1A4060", border:"#A0BCCF" },
  "Welsh":         { bg:"#EEF5EE", color:"#2A5C2A", border:"#A8C8A8" },
  "French":        { bg:"#F0EAF7", color:"#4A1A70", border:"#C0A0D8" },
  "German":        { bg:"#F5F0E8", color:"#5C4A00", border:"#D4C080" },
  "Russian":       { bg:"#F5EEE8", color:"#6B2A1A", border:"#D4B0A0" },
  "Nigerian":      { bg:"#FFF0E0", color:"#7A3A00", border:"#DFC090" },
  "Norwegian":     { bg:"#E8EEF5", color:"#1A2A5C", border:"#A0B0CF" },
  "Italian":       { bg:"#F5F0EC", color:"#5C3A20", border:"#D4C0A8" },
};
function natStyle(nat) {
  const key = Object.keys(NAT_COLORS).find(k => nat.includes(k));
  return key ? NAT_COLORS[key] : { bg:"#F0EDE8", color:"#5C4A38", border:"#C4B090" };
}

function buildList() {
  const container = document.getElementById('writer-list');
  DATA.forEach(century => {
    const block = document.createElement('div');
    block.className = 'century-block';
    block.innerHTML = `<div class="century-heading">${century.century}</div>`;

    century.periods.forEach(period => {
      const section = document.createElement('div');
      section.className = 'period-section';
      section.innerHTML = `
        <div class="period-header">
          <div class="period-dot" style="background:${period.color}"></div>
          <div class="period-name">${period.name}</div>
          <div class="period-years">${period.years}</div>
        </div>
        <div class="ornament-divider">— ✶ —</div>
      `;
      const grid = document.createElement('div');
      grid.className = 'writer-grid';

      period.writers.forEach(w => {
        const ns = natStyle(w.nat);
        const a = document.createElement('a');
        a.className = 'writer-link';
        a.href = w.url;
        a.setAttribute('aria-label', `${w.n}, ${w.nat}, ${w.d}`);
        a.dataset.search = (w.n + ' ' + w.nat + ' ' + w.work + ' ' + w.d).toLowerCase();
        a.innerHTML = `
          <div class="w-stripe" style="background:${period.color}"></div>
          <div class="w-body">
            <div class="w-name">${w.n}</div>
            <div class="w-dates">${w.d}</div>
            <div class="w-nat" style="background:${ns.bg};color:${ns.color};border-color:${ns.border}">${w.nat}</div>
            <div class="w-work">${w.work}</div>
          </div>
          <span class="w-arrow" aria-hidden="true">›</span>
        `;
        grid.appendChild(a);
      });

      section.appendChild(grid);
      block.appendChild(section);
    });

    container.appendChild(block);
  });
}

// Search
const searchEl = document.getElementById('search');
const noResults = document.getElementById('no-results');

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  const allLinks = document.querySelectorAll('.writer-link');
  let anyVisible = false;

  allLinks.forEach(a => {
    const match = !q || a.dataset.search.includes(q);
    a.classList.toggle('hidden', !match);
    if (match) anyVisible = true;
  });

  // Hide/show period sections and century blocks if empty
  document.querySelectorAll('.period-section').forEach(sec => {
    const hasVisible = [...sec.querySelectorAll('.writer-link')].some(a => !a.classList.contains('hidden'));
    sec.style.display = hasVisible ? '' : 'none';
  });
  document.querySelectorAll('.century-block').forEach(blk => {
    const hasVisible = [...blk.querySelectorAll('.writer-link')].some(a => !a.classList.contains('hidden'));
    blk.style.display = hasVisible ? '' : 'none';
  });

  noResults.style.display = anyVisible ? 'none' : 'block';
});

buildList();
</script>
